<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Douceurs & Gourmandises</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">Douceurs & Gourmandises</div>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="patisseries.html">Nos Pâtisseries</a></li>
            <li><a href="panier.html">🛒 Panier</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <section style="padding: 5rem 10%; text-align: center;">
        <h1>Contactez-nous</h1>
        <p>Une question ? Une demande spéciale ? Écrivez-nous !</p>
        
        <form>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" placeholder="Votre nom" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea placeholder="Votre message..."></textarea>
            </div>
            <button type="submit" class="btn" style="border: none; cursor: pointer; width: 100%;">Envoyer</button>
        </form>

        <div style="margin-top: 3rem;">
            <h3>Notre Boutique</h3>
            <p>12 Rue de la Gourmandise, 75000 Paris</p>
            <p>Ouvert du Mardi au Samedi : 8h - 19h</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Douceurs & Gourmandises - Pâtisserie Artisanale</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
